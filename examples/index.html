<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>swr todos</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 2rem auto; padding: 0 1rem; }
      h1 { margin-bottom: 0.25rem; }
      .hint { color: #666; margin-top: 0; }
      form { display: flex; gap: 0.5rem; margin: 1rem 0; }
      input[type=text] { flex: 1; padding: 0.5rem; font-size: 1rem; }
      button { padding: 0.4rem 0.8rem; font-size: 0.95rem; cursor: pointer; }
      ul.todos { list-style: none; padding: 0; border-top: 1px solid #ddd; }
      ul.todos li { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid #eee; }
      ul.todos li label { flex: 1; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
      ul.todos li.done span { text-decoration: line-through; color: #999; }
      ul.todos li.empty { justify-content: center; color: #999; }
      .meta { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; color: #555; font-size: 0.9rem; }
      .meta .filters { display: flex; gap: 0.25rem; margin-left: auto; }
      .meta button.active { background: #333; color: #fff; }
    </style>
  </head>
  <body>
    <h1>swr todos</h1>
    <p class="hint">HTML rendered in a SharedWorker; state shared in another SharedWorker (ssw). Open in two tabs.</p>
    <form id="add-form">
      <input id="new-todo" type="text" placeholder="what needs doing?" autocomplete="off" autofocus />
      <button type="submit">add</button>
    </form>
    <div id="view">loading...</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
